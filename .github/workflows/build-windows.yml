name: Build Windows EXE

on:
  # Ручной запуск: Actions → Build Windows EXE → Run workflow
  workflow_dispatch:

  # Автоматически при push в main/master
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'build.spec'
      - 'requirements.txt'
      - '.github/workflows/build-windows.yml'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE (PyInstaller)
        run: pyinstaller build.spec --clean --noconfirm

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProtokolSbornshchik-Windows
          path: dist/ПротоколСборщик.exe
          if-no-files-found: error
          retention-days: 30
