name: Build Windows EXE

on:
  # Ручной запуск: Actions → Build Windows EXE → Run workflow
  workflow_dispatch:

  # Автоматически при push в main/master
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'assets/**'
      - 'build.spec'
      - 'requirements.txt'
      - 'installer/**'
      - '.github/workflows/build-windows.yml'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE (PyInstaller)
        run: pyinstaller build.spec --clean --noconfirm

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer (Setup.exe)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path installer_output | Out-Null
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\ProtocolBuilder.iss

      - name: Upload portable EXE
        uses: actions/upload-artifact@v4
        with:
          name: ProtokolSbornshchik-Windows-Portable
          path: dist/ПротоколСборщик.exe
          if-no-files-found: error
          retention-days: 30

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ProtokolSbornshchik-Windows-Setup
          path: installer_output/ПротоколСборщик_Setup.exe
          if-no-files-found: error
          retention-days: 30
